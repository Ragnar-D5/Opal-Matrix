name: "publish"

on:
    push:
        branches:
            - release
    workflow_dispatch:

jobs:
    publish-tauri:
        permissions:
            contents: write
        outputs:
            appVersion: ${{ steps.tauri.outputs.appVersion }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: "ubuntu-22.04"
                      args: ""
                    - platform: "windows-latest"
                      args: ""

        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/checkout@v4

            # 1. Install Linux System Dependencies (Added libasound2-dev for ALSA support)
            - name: Install Dependencies (Ubuntu only)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

            # 2. Install Rust WITH the WebAssembly target
            - name: Install Rust Stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: "wasm32-unknown-unknown"

            # 3. Install Trunk
            - name: Install Trunk
              uses: jetli/trunk-action@v0.5.1
              with:
                  version: "latest"

            # 4A. Official Tailwind Installation for Linux
            # Moves it directly into /usr/local/bin which is pre-mapped on Linux runners
            - name: Install Tailwind CLI (Ubuntu)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
                  chmod +x tailwindcss-linux-x64
                  sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss
            # 4B. Official Tailwind Installation for Windows
            # Pulls the .exe, sets up a clean directory, and appends to GITHUB_PATH using modern syntax
            - name: Install Tailwind CLI (Windows)
              if: matrix.platform == 'windows-latest'
              shell: pwsh
              run: |
                  Invoke-WebRequest -Uri "https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-windows-x64.exe" -OutFile "tailwindcss.exe"
                  New-Item -ItemType Directory -Force -Path "C:\tailwind"
                  Move-Item -Path "tailwindcss.exe" -Destination "C:\tailwind\tailwindcss.exe"
                  echo "C:\tailwind" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
            # 5. Install cargo-binstall & Tauri CLI
            - name: Install cargo-binstall
              uses: taiki-e/install-action@cargo-binstall

            - name: Install Tauri CLI (Precompiled)
              run: cargo binstall -y tauri-cli

            # 6. Collapse TOML 1.1 multiline inline tables in Cargo.toml manifests.
            # Cargo itself (and toml_edit, which this helper uses) is fine with
            # them, but tauri-action's bundled TOML parser only supports TOML 1.0
            # and errors on newlines inside `{ ... }`. This only rewrites the
            # checkout for this CI run, the repo keeps the multiline style.
            - name: Normalize Cargo.toml for tauri-action
              shell: bash
              run: cargo run --manifest-path .github/tools/collapse-toml/Cargo.toml --quiet -- Cargo.toml shared/Cargo.toml macros/Cargo.toml src-tauri/Cargo.toml

            # 7. Pre-seed a wrapped linuxdeploy GTK plugin into tauri-bundler's
            # tool cache. tauri-bundler only downloads the plugin when the file
            # is missing, so this wrapper is what the AppImage bundling runs:
            # it forwards to the real plugin, then deletes the libwayland-*
            # copies linuxdeploy deployed into the AppDir. Shipping Ubuntu
            # 22.04's wayland libs breaks EGL display creation against newer
            # host Mesa/driver stacks — WebKit aborts with EGL_BAD_PARAMETER
            # and the window stays white (seen on Arch + RDNA4). Without the
            # bundled copies the host's own libwayland is loaded, which any
            # system able to run webkit2gtk ships anyway. Stripping at bundle
            # time (before signing) keeps the updater signature valid.
            - name: Strip bundled wayland libs from AppImage (Ubuntu only)
              if: matrix.platform == 'ubuntu-22.04'
              shell: bash
              run: |
                  mkdir -p ~/.cache/tauri
                  curl -sSL -o ~/.cache/tauri/gtk-plugin-real.sh \
                      https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
                  cat > ~/.cache/tauri/linuxdeploy-plugin-gtk.sh <<'EOF'
                  #!/usr/bin/env bash
                  set -euo pipefail

                  here="$(dirname "$(readlink -f "$0")")"
                  "$here/gtk-plugin-real.sh" "$@"

                  appdir=""
                  prev=""
                  for arg in "$@"; do
                      if [ "$prev" = "--appdir" ]; then appdir="$arg"; fi
                      prev="$arg"
                  done

                  if [ -n "$appdir" ]; then
                      echo "Removing bundled libwayland from $appdir so the host's copy is used"
                      rm -fv "$appdir"/usr/lib/libwayland-*
                      sed -i '/export GDK_BACKEND=x11/d' "$appdir"/apprun-hooks/linuxdeploy-plugin-gtk.sh
                  fi
                  EOF
                  chmod +x ~/.cache/tauri/linuxdeploy-plugin-gtk.sh ~/.cache/tauri/gtk-plugin-real.sh

            # 8. Run the Tauri Action
            - id: tauri
              uses: tauri-apps/tauri-action@v0.6.2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: ${{ matrix.platform == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
              with:
                  tagName: app-v__VERSION__
                  releaseName: "App v__VERSION__"
                  releaseBody: "See the assets to download this version and install."
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}
                  tauriScript: cargo tauri

    mirror-to-codeberg:
        needs: publish-tauri
        runs-on: ubuntu-latest
        permissions:
            contents: write
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
            VERSION: ${{ needs.publish-tauri.outputs.appVersion }}
        steps:
            - uses: actions/checkout@v4

            - name: Copy release assets from the GitHub mirror to Codeberg
              shell: bash
              run: |
                  set -euo pipefail

                  TAG="app-v${VERSION}"
                  CB_OWNER="aosiuejhf"
                  CB_REPO="opal-matrix"
                  CB_API="https://codeberg.org/api/v1/repos/${CB_OWNER}/${CB_REPO}"

                  # API Helper function
                  api() {
                      local method="$1" path="$2"
                      shift 2
                      
                      local clean_token=$(echo "${CODEBERG_TOKEN}" | tr -d '\r\n ')
                      local clean_url=$(echo "${CB_API}${path}" | tr -d '\r\n ')

                      curl -sS -w '\n%{http_code}' -X "$method" \
                          -H "Authorization: token ${clean_token}" \
                          "$@" "${clean_url}"
                  }

                  # =========================================================================
                  # PRE-FLIGHT CHECK: Abort if the versioned release already exists on Codeberg
                  # =========================================================================
                  echo "Checking if versioned release '${TAG}' already exists on Codeberg..."
                  resp=$(api GET "/releases/tags/${TAG}")
                  code=$(tail -n1 <<<"$resp")
                  if [ "$code" == "200" ]; then
                      echo "::error::Release for version ${VERSION} (${TAG}) already exists on Codeberg! Aborting run to prevent overwriting historical releases."
                      exit 1
                  fi

                  mkdir -p assets
                  gh release download "$TAG" --dir assets --clobber

                  # Point the updater manifest at the Codeberg copies of the assets.
                  sed -i "s#https://github.com/${GITHUB_REPOSITORY}/releases/download/#https://codeberg.org/${CB_OWNER}/${CB_REPO}/releases/download/#g" assets/latest.json

                  sync_to_codeberg() {
                      local target_tag="$1"
                      local release_name="$2"
                      local is_draft="$3" 
                      local RELEASE_ID=""

                      echo "Syncing to Codeberg tag: ${target_tag}..."
                      resp=$(api GET "/releases/tags/${target_tag}")
                      code=$(tail -n1 <<<"$resp")
                      body=$(sed '$d' <<<"$resp")

                      if [ "$code" == "200" ]; then
                          # =========================================================================
                          # SAFETY GUARDRAIL: Only the "latest" release is permitted to be overwritten
                          # =========================================================================
                          if [ "$target_tag" != "latest" ]; then
                              echo "::error::Release for tag ${target_tag} already exists on Codeberg. Aborting!"
                              exit 1
                          fi
                          RELEASE_ID=$(jq -r '.id' <<<"$body")
                          echo "Found existing release ${RELEASE_ID}. Moving target to current commit..."
                          payload=$(jq -n --arg sha "${GITHUB_SHA}" --arg name "$release_name" --argjson draft "$is_draft" \
                              '{target_commitish:$sha,name:$name,draft:$draft}')
                          api PATCH "/releases/${RELEASE_ID}" -H "Content-Type: application/json" -d "$payload" > /dev/null
                      elif [ "$code" == "404" ]; then
                          echo "Release not found, creating a new one..."
                          payload=$(jq -n --arg tag "$target_tag" --arg name "$release_name" --arg sha "${GITHUB_SHA}" --argjson draft "$is_draft" \
                              '{tag_name:$tag,target_commitish:$sha,name:$name,body:"See the assets to download this version and install.",draft:$draft,prerelease:false}')
                          resp=$(api POST "/releases" -H "Content-Type: application/json" -d "$payload")
                          code=$(tail -n1 <<<"$resp")
                          body=$(sed '$d' <<<"$resp")
                          if [ "$code" != "201" ]; then echo "$body"; exit 1; fi
                          RELEASE_ID=$(jq -r '.id' <<<"$body")
                      else
                          echo "$body"; exit 1
                      fi

                      # Fetch existing assets to wipe them clean before re-uploading
                      resp=$(api GET "/releases/${RELEASE_ID}/assets")
                      code=$(tail -n1 <<<"$resp")
                      existing_assets=$(sed '$d' <<<"$resp")
                      if [ "$code" != "200" ]; then echo "$existing_assets"; exit 1; fi

                      # Completely wipe old assets from this release
                      echo "Wiping existing assets on Codeberg for clean slate..."
                      for id in $(jq -r '.[] | .id' <<<"$existing_assets"); do
                          if [ -n "$id" ] && [ "$id" != "null" ]; then
                              curl -sS -f -X DELETE -H "Authorization: token ${CODEBERG_TOKEN}" \
                                  "${CB_API}/releases/${RELEASE_ID}/assets/${id}"
                          fi
                      done

                      # Filter and upload the correct assets
                      for f in assets/*; do
                          [ -e "$f" ] || continue
                          name=$(basename "$f")

                          # Skip binaries/manifests other than latest.json if this is the "latest" release
                          if [ "$target_tag" = "latest" ] && [ "$name" != "latest.json" ]; then
                              echo "Skipping ${name} for 'latest' release (only latest.json allowed)"
                              continue
                          fi

                          # Skip latest.json if this is the versioned release
                          if [ "$target_tag" != "latest" ] && [ "$name" = "latest.json" ]; then
                              echo "Skipping ${name} for versioned release (latest.json excluded)"
                              continue
                          fi

                          echo "Uploading ${name} to ${target_tag}..."
                          curl -sS -f -X POST -H "Authorization: token ${CODEBERG_TOKEN}" \
                              -F "attachment=@${f};filename=${name}" \
                              "${CB_API}/releases/${RELEASE_ID}/assets?name=${name}"
                      done
                  }

                  # 1. Update/Create the specific versioned release -> PUBLISHED ("false")
                  sync_to_codeberg "$TAG" "App v${VERSION}" "false"

                  # 2. Update/Create the static public LATEST release -> PUBLISHED ("false")
                  sync_to_codeberg "latest" "Latest Stable Release" "false"

                  echo "Cleaning up the temporary draft on the GitHub mirror..."
                  gh release delete "$TAG" --yes
