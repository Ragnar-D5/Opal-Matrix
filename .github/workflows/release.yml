name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0

      - name: Install Tailwind CSS
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-windows-x64.exe" -OutFile "tailwindcss.exe"
          Move-Item tailwindcss.exe "$env:RUNNER_TOOL_CACHE\tailwindcss.exe"
          echo "$env:RUNNER_TOOL_CACHE" >> $env:GITHUB_PATH

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build
        run: cargo tauri build
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
