name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    build-windows:
        runs-on: windows-latest

        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown

            - name: Cache Rust
              uses: Swatinem/rust-cache@v2

            - name: Install Trunk
              uses: jetli/trunk-action@v0.5.0

            - name: Install Tailwind CSS
              shell: pwsh
              run: |
                  Invoke-WebRequest -Uri "https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-windows-x64.exe" -OutFile "tailwindcss.exe"
                  Move-Item tailwindcss.exe "$env:RUNNER_TOOL_CACHE\tailwindcss.exe"
                  "$env:RUNNER_TOOL_CACHE" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

            - name: Install Tauri CLI
              uses: taiki-e/install-action@v2
              with:
                  tool: tauri-cli@^2

            - name: Build
              run: cargo tauri build
              env:
                  RUSTFLAGS: "-C target-feature=+crt-static"

            # 4. Fixed artifact paths to point to the workspace root
            - name: Upload artifacts
              uses: softprops/action-gh-release@v2
              with:
                  draft: true
                  files: |
                      target/release/bundle/nsis/*.exe
                      target/release/bundle/msi/*.msi
