# Rust 1.82+ enables bulk-memory and nontrapping-fptoint by default for
# wasm32-unknown-unknown, but older WebKitGTK builds (e.g. the one apt
# installs on ubuntu-22.04 CI runners, or on users' systems) don't support
# them yet, which causes WebAssembly.instantiate() to throw and the webview
# to render a blank/white window. Disable them so the frontend wasm stays
# compatible.
#
# NOTE: this only takes effect if nothing sets a plain RUSTFLAGS env var,
# which outranks target.*.rustflags entirely (config or CARGO_TARGET_*
# env-var form alike). The CI workflow must scope any native-target flags
# via CARGO_TARGET_<triple>_RUSTFLAGS instead of a blanket RUSTFLAGS.
[target.wasm32-unknown-unknown]
rustflags = ["-C", "target-feature=-bulk-memory,-nontrapping-fptoint"]
